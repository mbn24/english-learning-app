<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EnglishMaster - اختبار التسجيل</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>اختبار تسجيل الدخول</h1>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="signup()">إنشاء حساب جديد</button>
    <button onclick="login()">تسجيل الدخول</button>
    <p id="message"></p>

    <script>
        // أدخل بيانات Supabase الصحيحة هنا!
        const SUPABASE_URL = "https://xxxxxxxxxxxxxxxxxxxx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ...";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.signup = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                document.getElementById('message').innerText = "خطأ: " + error.message;
            } else {
                document.getElementById('message').innerText = "تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتأكيد التسجيل (إذا كنت قد فعّلت هذه الخاصية).";
            }
        };

        window.login = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('message').innerText = "خطأ في تسجيل الدخول: " + error.message;
            } else {
                document.getElementById('message').innerText = "تم تسجيل الدخول بنجاح! مرحباً " + email;
            }
        };
    </script>
</body>
</html>
