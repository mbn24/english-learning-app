<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishMaster - تعلم الإنجليزية حسب مجالك</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app">
        <h2>✨ EnglishMaster ✨</h2>
        
        <!-- قسم تسجيل الدخول وإنشاء حساب -->
        <div id="auth">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <button onclick="login()">تسجيل الدخول</button>
            <p id="msg" class="error"></p>
        </div>
        
        <!-- قسم الملف الشخصي (يظهر بعد تسجيل الدخول) -->
        <div id="profile" style="display:none;">
            <p>مرحباً <span id="userEmail"></span> 🎉</p>
            <button onclick="logout()">تسجيل خروج</button>
            <h3>اختر مجالك:</h3>
            <div id="fields">
                <div class="card" onclick="saveField('مطور')">💻 مطور برمجيات</div>
                <div class="card" onclick="saveField('طب')">🩺 طالب طب</div>
                <div class="card" onclick="saveField('قانون')">⚖️ طالب قانون</div>
                <div class="card" onclick="saveField('تلميذ')">📚 تلميذ</div>
                <div class="card" onclick="saveField('أعمال')">💼 رجل أعمال</div>
                <div class="card" onclick="saveField('عام')">🌍 عام</div>
            </div>
            <p id="fieldMsg"></p>
        </div>
        <div id="lessonsPanel" style="display: none;">
            <div id="lessonsContent"></div>
        </div>
    </div>
    <script src="lessons.js"></script>
    <script src="script.js"></script>
</body>
</html>
